<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لـ زوزو ❤️</title>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            height: 100vh; background: #1a1a1a; font-family: 'Arial', sans-serif; overflow: hidden;
            transition: background 0.2s; position: relative; color: #fff;
        }

        /* حاوية المطر */
        #particles-js {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; opacity: 0.6;
        }

        .container {
            background: rgba(0, 0, 0, 0.7); padding: 40px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
            max-width: 400px; width: 90%; z-index: 10; backdrop-filter: blur(8px);
            border: 1px solid #ff4b2b;
        }

        h1 { color: #ff4b2b; margin-bottom: 20px; font-size: 24px; text-shadow: 2px 2px 4px #000; }
        .btn-group { display: flex; justify-content: center; gap: 20px; margin-top: 20px; position: relative; }
        button { padding: 10px 30px; font-size: 18px; border: none; border-radius: 10px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn-yes { background-color: #28a745; color: white; }
        .btn-no { background-color: #dc3545; color: white; }

        /* شاشة الرعب */
        .scary-bg {
            background: black !important;
            /* استبدل الرابط اللي بالأسفل برابط صورتك المرعبة */
            background-image: url('https://i.imgur.com/S6eMh6C.jpeg') !important; 
            background-size: contain !important; background-repeat: no-repeat !important; background-position: center !important;
        }
        #countdown { font-size: 150px; color: #ff0000; font-weight: bold; display: none; z-index: 100; position: absolute; text-shadow: 0 0 20px #000; }
        .hidden { display: none; }
        
        /* قلوب النهاية */
        .heart { position: absolute; font-size: 30px; animation: fly 2s ease-out forwards; pointer-events: none; z-index: 20; }
        @keyframes fly { 0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; } 100% { transform: translateY(-600px) scale(2) rotate(360deg); opacity: 0; } }
        #final-btn { cursor: pointer; color: #ff4b2b; font-size: 35px; font-weight: bold; text-decoration: underline; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <audio id="scary-sound" src="https://www.myinstants.com/media/sounds/screamer_1.mp3"></audio>

    <div id="step1" class="container">
        <h1>انتي زوزو؟</h1>
        <div class="btn-group">
            <button class="btn-yes" onclick="nextStep(2)">اي</button>
            <button class="btn-no" onclick="scaryMode()">لا</button>
        </div>
    </div>

    <div id="step2" class="container hidden">
        <h1>حسنا كملي.. تحبيني؟</h1>
        <div class="btn-group" style="height: 100px;">
            <button class="btn-yes" onclick="nextStep(3)">اويه</button>
            <button class="btn-no" id="no-run" onmouseover="runAway()" onclick="runAway()">لا</button>
        </div>
    </div>

    <div id="step3" class="container hidden">
        <h1>يعني الحين تحبيني او لا</h1>
        <div class="btn-group">
            <button class="btn-yes" onclick="nextStep(4)">اي</button>
        </div>
    </div>

    <div id="step4" class="container hidden">
        <div id="final-btn" onclick="createHearts(event)">أحبك ❤️</div>
        <p style="font-size: 20px; color: #ddd;">حتى انا احبج يا عمري يا حياتي انتي يا كوني</p>
    </div>

    <div id="countdown">5</div>

    <script>
        function nextStep(step) {
            document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
            document.getElementById('step' + step).classList.remove('hidden');
        }

        function runAway() {
            const btn = document.getElementById('no-run');
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function scaryMode() {
            document.querySelectorAll('.container').forEach(el => el.style.display = 'none');
            // تأكد من أن حاوية المطر مخفية أيضاً
            document.getElementById('particles-js').style.display = 'none';
            document.body.classList.add('scary-bg');
            const sound = document.getElementById('scary-sound');
            sound.volume = 1.0;
            sound.play();

            const counterDiv = document.getElementById('countdown');
            counterDiv.style.display = 'block';
            let count = 5;
            const interval = setInterval(() => {
                count--;
                counterDiv.innerText = count;
                if (count <= 0) {
                    clearInterval(interval);
                    window.location.href = "https://www.google.com";
                }
            }, 1000);
        }

        function createHearts(e) {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.innerHTML = ['❤️', '💖', '💗', '💕'][Math.floor(Math.random() * 4)];
                    heart.classList.add('heart');
                    heart.style.left = (e.clientX + (Math.random() * 150 - 75)) + 'px';
                    heart.style.top = e.clientY + 'px';
                    document.body.appendChild(heart);
                    setTimeout(() => heart.remove(), 2000);
                }, i * 50);
            }
        }

        // إعداد تأثير المطر
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 160, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": false, "anim": { "enable": false } },
                "size": { "value": 3, "random": true, "anim": { "enable": false } },
                "line_linked": { "enable": false },
                "move": {
                    "enable": true,
                    "speed": 6,
                    "direction": "bottom",
                    "random": false,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false
                }
            },
            "retina_detect": true
        });
    </script>
</body>
</html>
